<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Stay Awake</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #f5f5f0; color: #1a1a18; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 3rem 1.5rem; }
  .wrap { max-width: 420px; width: 100%; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 2rem; text-align: center; }
  .ring { width: 130px; height: 130px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-direction: column; margin: 0 auto 2rem; border: 3px solid #ccc; transition: all 0.4s; }
  .ring.active { border-color: #1D9E75; background: #E1F5EE; }
  .dot { width: 14px; height: 14px; border-radius: 50%; background: #ccc; margin-bottom: 10px; transition: background 0.3s; }
  .dot.active { background: #1D9E75; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  .ring-label { font-size: 14px; color: #888; }
  .ring-label.active { color: #0F6E56; }
  .btn { width: 100%; padding: 16px; font-size: 17px; font-weight: 500; border-radius: 12px; cursor: pointer; border: 1px solid #ccc; background: #fff; color: #1a1a18; margin-bottom: 1.5rem; -webkit-tap-highlight-color: transparent; }
  .btn.active { background: #E1F5EE; border-color: #1D9E75; color: #0F6E56; }
  .info { background: #fff; border-radius: 12px; border: 1px solid #e8e8e4; overflow: hidden; margin-bottom: 1rem; }
  .info-row { display: flex; justify-content: space-between; padding: 10px 16px; font-size: 14px; border-bottom: 1px solid #f0f0eb; }
  .info-row:last-child { border-bottom: none; }
  .info-row span:first-child { color: #888; }
  .info-row span:last-child { font-weight: 500; }
  .badge { display: inline-block; font-size: 12px; padding: 4px 10px; border-radius: 99px; margin-bottom: 1.25rem; }
  .badge.wl { background: #E6F1FB; color: #185FA5; }
  .badge.audio { background: #FAEEDA; color: #854F0B; }
  .badge.off { background: #f0f0eb; color: #888; }
  .log { font-size: 12px; color: #aaa; font-family: monospace; max-height: 100px; overflow-y: auto; background: #fff; border-radius: 8px; padding: 10px 12px; border: 1px solid #e8e8e4; }
  .log div { padding: 1px 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Stay Awake</h1>

  <div class="ring" id="ring">
    <div class="dot" id="dot"></div>
    <div class="ring-label" id="ring-label">Inaktiv</div>
  </div>

  <button class="btn" id="btn" onclick="toggle()">Display wach halten</button>

  <div style="text-align:center; margin-bottom:1rem">
    <span class="badge off" id="badge">Nicht aktiv</span>
  </div>

  <div class="info">
    <div class="info-row"><span>Status</span><span id="s-status">—</span></div>
    <div class="info-row"><span>Methode</span><span id="s-method">—</span></div>
    <div class="info-row"><span>Aktiv seit</span><span id="s-since">—</span></div>
    <div class="info-row"><span>Nächster Ping</span><span id="s-next">—</span></div>
  </div>

  <div class="log" id="log"></div>
</div>

<script>
let wakeLock = null, audioCtx = null, pingInterval = null, timerInterval = null;
let active = false, startTime = null, nextPing = null;
const INTERVAL = 4 * 60 * 1000;

function log(msg) {
  const el = document.getElementById('log');
  const t = new Date().toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const d = document.createElement('div');
  d.textContent = t + '  ' + msg;
  el.prepend(d);
}

function setUI(on, method) {
  document.getElementById('ring').className = 'ring ' + (on ? 'active' : '');
  document.getElementById('dot').className = 'dot ' + (on ? 'active' : '');
  document.getElementById('ring-label').className = 'ring-label ' + (on ? 'active' : '');
  document.getElementById('ring-label').textContent = on ? 'Aktiv' : 'Inaktiv';
  document.getElementById('btn').className = 'btn ' + (on ? 'active' : '');
  document.getElementById('btn').textContent = on ? 'Deaktivieren' : 'Display wach halten';
  document.getElementById('s-status').textContent = on ? 'Läuft' : '—';
  document.getElementById('s-method').textContent = on ? (method || '—') : '—';
  const badge = document.getElementById('badge');
  if (!on) { badge.className = 'badge off'; badge.textContent = 'Nicht aktiv'; }
  else if (method === 'Wake Lock API') { badge.className = 'badge wl'; badge.textContent = 'Wake Lock API'; }
  else { badge.className = 'badge audio'; badge.textContent = 'Audio-Fallback'; }
}

function updateTimers() {
  if (!active) return;
  const since = startTime ? new Date(startTime).toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'}) : '—';
  document.getElementById('s-since').textContent = since;
  if (nextPing) {
    const rem = Math.max(0, Math.round((nextPing - Date.now()) / 1000));
    document.getElementById('s-next').textContent = rem + 's';
  } else {
    document.getElementById('s-next').textContent = 'Wake Lock aktiv';
  }
}

function playPing() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
  } catch(e) { log('Audio-Fehler: ' + e.message); }
}

function scheduleAudio() {
  nextPing = Date.now() + INTERVAL;
  clearInterval(pingInterval);
  pingInterval = setInterval(() => {
    playPing();
    nextPing = Date.now() + INTERVAL;
    log('Audio-Ping gesendet');
  }, INTERVAL);
}

async function tryWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => {
        log('Wake Lock freigegeben — Audio-Fallback aktiv');
        if (active) scheduleAudio();
      });
      log('Wake Lock API aktiv');
      return true;
    } catch(e) { log('Wake Lock nicht verfügbar'); }
  }
  return false;
}

async function toggle() {
  if (!active) {
    active = true; startTime = Date.now();
    const wlOk = await tryWakeLock();
    const method = wlOk ? 'Wake Lock API' : 'Audio-Fallback';
    if (!wlOk) { playPing(); scheduleAudio(); }
    else { nextPing = null; }
    setUI(true, method);
    timerInterval = setInterval(updateTimers, 1000);
    log('Gestartet — ' + method);
  } else {
    active = false;
    if (wakeLock) { wakeLock.release(); wakeLock = null; }
    clearInterval(pingInterval); clearInterval(timerInterval);
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
    setUI(false, null);
    document.getElementById('s-since').textContent = '—';
    document.getElementById('s-next').textContent = '—';
    log('Gestoppt');
  }
}

document.addEventListener('visibilitychange', async () => {
  if (active && document.visibilityState === 'visible' && !wakeLock) {
    const wlOk = await tryWakeLock();
    if (wlOk) { clearInterval(pingInterval); nextPing = null; log('Wake Lock wiederhergestellt'); }
  }
});
</script>
</body>
</html>
